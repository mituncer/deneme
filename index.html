<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mituncer / central hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  :root {
    --bg:        #0d0d0d;
    --bg2:       #141414;
    --bg3:       #1c1c1c;
    --border:    #272727;
    --border-hi: #383838;
    --green:     #39d353;
    --green-dk:  #1a6b29;
    --amber:     #e3b341;
    --blue:      #58a6ff;
    --muted:     #444;
    --text:      #cdd9e5;
    --text-dim:  #6e7f8d;
    --red:       #f85149;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    min-height: 100vh;
    padding: 2.5rem 1.25rem;
    font-size: 13px;
    line-height: 1.7;
  }

  .wrap { max-width: 700px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 6px; display: flex; gap: 6px; align-items: center;
  }
  .breadcrumb .u { color: var(--green); }
  .breadcrumb .r { color: var(--blue); }
  h1 { font-size: 20px; font-weight: 700; color: #e6edf3; letter-spacing: -0.3px; }
  h1 em { color: var(--green); font-style: normal; }
  .cursor {
    display: inline-block; width: 7px; height: 13px;
    background: var(--green); margin-left: 1px; vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Section label ── */
  .lbl {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 2.5px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .lbl::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ── Inputs ── */
  .input-wrap { position: relative; margin-bottom: 1.5rem; }
  .pfx {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--green); font-weight: 700; pointer-events: none; z-index: 2;
  }
  input[type=text] {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 13px;
    padding: 11px 13px 11px 30px; outline: none; border-radius: 4px;
    caret-color: var(--green); transition: border-color .15s;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--green-dk); }

  /* ── Dropdowns (Repo & Dosya Arama) ── */
  .dd {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg2); border: 1px solid var(--border-hi);
    border-radius: 4px; z-index: 50; display: none; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .dd.open { display: block; }
  .dd-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 13px; border-bottom: 1px solid var(--border);
    text-decoration: none; color: inherit; cursor: pointer;
  }
  .dd-row:last-child { border-bottom: none; }
  .dd-row:hover, .dd-row.sel { background: var(--bg3); }
  .dd-row .nm mark { background: none; color: var(--green); }

  /* ── File list ── */
  .list { margin-bottom: 2.5rem; }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 13px; border: 1px solid var(--border); border-top: none;
    text-decoration: none; color: inherit; transition: background .1s;
  }
  .row:first-child { border-top: 1px solid var(--border); border-radius: 4px 4px 0 0; }
  .row:last-child  { border-radius: 0 0 4px 4px; }
  .row:hover { background: var(--bg2); border-color: var(--border-hi); }
  .row .nm   { color: var(--blue); flex: 1; }
  .row .meta { color: var(--text-dim); font-size: 10px; text-align: right; }

  /* ── Status & Notice ── */
  .notice {
    font-size: 11px; color: var(--amber); padding: 8px 13px;
    background: var(--bg2); border: 1px solid var(--border);
    border-left: 2px solid var(--amber); border-radius: 4px;
    margin-bottom: 1.5rem; display: none;
  }
  .status {
    padding-top: 1rem; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--muted);
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; }
  .dot.warn { background: var(--amber); }
  .dot.err  { background: var(--red); }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="breadcrumb">
      <span class="u">mituncer</span><span>/</span><span class="r" id="b-repo">hub</span><span>·</span><span>main</span>
    </div>
    <h1>central <em>hub</em><span class="cursor"></span></h1>
  </div>

  <div class="notice" id="notice"></div>

  <div class="lbl">repo değiştir</div>
  <div class="input-wrap">
    <span class="pfx">#</span>
    <input type="text" id="repo-in" placeholder="kullanıcı/repo (örn: mituncer/deneme)" autocomplete="off" spellcheck="false">
    <div class="dd" id="repo-dd"></div>
  </div>

  <div class="lbl">dosyalarda ara</div>
  <div class="input-wrap">
    <span class="pfx">&gt;</span>
    <input type="text" id="q" placeholder="dosya adı..." autocomplete="off" spellcheck="false">
    <div class="dd" id="dd"></div>
  </div>

  <div class="lbl">dosyalar</div>
  <div class="list" id="list">
    <div style="color:var(--muted)">// repo yüklenmesi bekleniyor...</div>
  </div>

  <div class="status">
    <div><span class="dot" id="dot"></span><span id="stxt">hazır</span></div>
    <div id="sright">mituncer/hub</div>
  </div>

</div>

<script>
let OWNER = 'mituncer';
let REPO  = 'deneme'; 
let BASE  = `https://${OWNER}.github.io/${REPO}/`;
let files = [];
let repoHistory = JSON.parse(localStorage.getItem('repo_history') || '[]');

const $ = id => document.getElementById(id);
const sz = b => !b ? '' : b < 1024 ? b+'B' : (b/1024).toFixed(1)+'KB';

function setDot(mode) { $('dot').className = 'dot' + (mode==='ok'?'':' '+mode); }
function notice(msg) { 
  const n=$('notice'); 
  if(!msg) { n.style.display='none'; return; }
  n.textContent=msg; n.style.display='block'; 
}

// --- Hafıza ve Öneri Mantığı ---
function saveRepo(o, r) {
  const full = `${o}/${r}`;
  if (!repoHistory.includes(full)) {
    repoHistory.push(full);
    localStorage.setItem('repo_history', JSON.stringify(repoHistory));
  }
}

$('repo-in').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const dd = $('repo-dd');
  if (!q) { dd.classList.remove('open'); return; }
  
  const hits = repoHistory.filter(h => h.toLowerCase().includes(q)).slice(0, 5);
  if (hits.length > 0) {
    dd.innerHTML = hits.map(h => `
      <div class="dd-row" onclick="selectRepo('${h}')">
        <span style="color:var(--blue); font-size:11px">#</span>
        <span class="nm">${h}</span>
      </div>`).join('');
    dd.classList.add('open');
  } else {
    dd.classList.remove('open');
  }
});

function selectRepo(path) {
  $('repo-in').value = path;
  $('repo-dd').classList.remove('open');
  loadFromInput(path);
}

// --- Yükleme ve Listeleme ---
function renderList(arr) {
  $('list').innerHTML = arr.length
    ? arr.map(f => `
      <a class="row" href="${BASE}${f.name}" target="_blank" rel="noopener">
        <span style="color:var(--amber); font-size:11px">▸</span>
        <span class="nm">${f.name}</span>
        <span class="meta">${sz(f.size)}<br>${f.date || ''}</span>
      </a>`).join('')
    : '<div style="padding:10px; color:var(--muted)">// dosya bulunamadı veya liste boş</div>';
}

async function load() {
  notice(null);
  $('list').innerHTML = '<div style="padding:10px; color:var(--text-dim)">bağlanıyor...</div>';
  setDot('warn');
  
  try {
    const r = await fetch(`${BASE}files.json?t=${Date.now()}`);
    if (!r.ok) throw new Error();
    
    files = await r.json();
    renderList(files);
    
    $('b-repo').textContent = REPO;
    $('stxt').textContent = `${files.length} dosya yüklendi`;
    $('sright').textContent = `${OWNER}/${REPO}`;
    setDot('ok');
    saveRepo(OWNER, REPO); // Başarılıysa hafızaya al
  } catch(e) {
    files = [];
    renderList([]);
    setDot('err');
    notice(`⚠ Hata: "${OWNER}/${REPO}" reposunda files.json bulunamadı.`);
  }
}

function loadFromInput(val) {
  if (val.includes('/')) {
    [OWNER, REPO] = val.split('/');
  } else {
    REPO = val;
  }
  BASE = `https://${OWNER}.github.io/${REPO}/`;
  load();
}

// Event Listeners
$('repo-in').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    loadFromInput(e.target.value.trim());
    $('repo-dd').classList.remove('open');
  }
});

$('q').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const dd = $('dd');
  if (!q) { dd.classList.remove('open'); return; }
  
  const hits = files.filter(f => f.name.toLowerCase().includes(q)).slice(0, 8);
  dd.innerHTML = hits.map(f => `
    <a class="dd-row" href="${BASE}${f.name}" target="_blank">
      <span style="color:var(--amber)">◈</span>
      <span class="nm">${f.name}</span>
    </a>`).join('');
  dd.classList.toggle('open', hits.length > 0);
});

// Sayfa dışına tıklanınca dropdownları kapat
document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) {
    $('dd').classList.remove('open');
    $('repo-dd').classList.remove('open');
  }
});

// İlk yükleme
load();
</script>
</body>
</html>
